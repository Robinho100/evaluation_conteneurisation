version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: taskflow_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: taskflow_backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      PORT: 3001
      REDIS_HOST: cache
      REDIS_PORT: 6379
    depends_on:
      - cache
    restart: on-failure

  cache:
    image: redis:7-alpine
    container_name: taskflow_cache
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
